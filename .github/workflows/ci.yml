name: DevSecOps CI

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Bandit
        run: poetry run bandit -r .

      - name: Ruff
        run: poetry run ruff check .

      - name: Safety
        run: poetry run safety check